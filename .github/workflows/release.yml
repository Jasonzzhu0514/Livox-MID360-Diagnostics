name: 发布 GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-prebuilt:
    name: 构建 ${{ matrix.arch }} 预编译二进制
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    container: ubuntu:20.04
    steps:
      - name: 安装构建依赖
        shell: bash
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            cmake \
            g++ \
            gcc \
            git \
            libncursesw5-dev \
            make \
            pkg-config \
            python3 \
            python3-pip \
            tar

      - name: 检出仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 构建单体程序
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/package_cpp_prebuilt.sh

      - name: 校验产物
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          ARCH="${{ matrix.arch }}"
          BINARY="dist/prebuilt/livox_mid360_diagnostics-linux-${ARCH}"
          VERSIONED_BINARY="dist/prebuilt/livox_mid360_diagnostics-${VERSION}-linux-${ARCH}"
          PACKAGE="dist/prebuilt/livox-mid360-diagnostics-cpp-${VERSION}-linux-${ARCH}.tar.gz"

          test -x "${BINARY}"
          test -x "${VERSIONED_BINARY}"
          test -s "${PACKAGE}"
          tar -tzf "${PACKAGE}" | grep -Fx "livox_mid360_diagnostics-linux-${ARCH}"
          "${BINARY}" --version
          "${VERSIONED_BINARY}" --version
          "${BINARY}" --help

      - name: 上传产物
        uses: actions/upload-artifact@v7
        with:
          name: prebuilt-${{ matrix.arch }}
          path: |
            dist/prebuilt/livox_mid360_diagnostics-linux-${{ matrix.arch }}
            dist/prebuilt/livox_mid360_diagnostics-*-linux-${{ matrix.arch }}
            dist/prebuilt/livox-mid360-diagnostics-cpp-*-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: 从版本标签发布 Release
    runs-on: ubuntu-24.04
    needs:
      - build-prebuilt
      - build-gui
    steps:
      - name: 检出仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 校验标签与版本文件
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(tr -d '[:space:]' < VERSION)"

          python3 scripts/release/validate_release.py --tag "${TAG}" --require-tag-at-head

          IFS=. read -r MAJOR MINOR PATCH EXTRA <<< "${VERSION}"
          if [[ -z "${MAJOR}" || -z "${MINOR}" || -z "${PATCH}" || -n "${EXTRA:-}" ]]; then
            echo "VERSION must use <major>.<minor>.<patch>: ${VERSION}" >&2
            exit 1
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: 下载预编译产物
        uses: actions/download-artifact@v8
        with:
          pattern: prebuilt-*
          path: dist/prebuilt
          merge-multiple: true

      - name: 下载 GUI 产物
        uses: actions/download-artifact@v8
        with:
          pattern: gui-*
          path: dist/gui
          merge-multiple: true

      - name: 校验预编译附件
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          REQUIRED=(
            "dist/prebuilt/livox_mid360_diagnostics-linux-x86_64"
            "dist/prebuilt/livox_mid360_diagnostics-linux-aarch64"
            "dist/prebuilt/livox_mid360_diagnostics-${VERSION}-linux-x86_64"
            "dist/prebuilt/livox_mid360_diagnostics-${VERSION}-linux-aarch64"
            "dist/prebuilt/livox-mid360-diagnostics-cpp-${VERSION}-linux-x86_64.tar.gz"
            "dist/prebuilt/livox-mid360-diagnostics-cpp-${VERSION}-linux-aarch64.tar.gz"
          )

          for asset in "${REQUIRED[@]}"; do
            if [[ ! -s "${asset}" ]]; then
              echo "Missing release asset: ${asset}" >&2
              exit 1
            fi
          done

      - name: 校验 GUI 附件
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          REQUIRED=(
            "dist/gui/livox-mid360-diagnostics-gui-${VERSION}-linux-x86_64.AppImage"
            "dist/gui/livox-mid360-diagnostics-gui-${VERSION}-linux-x86_64.deb"
            "dist/gui/livox-mid360-diagnostics-gui-${VERSION}-linux-aarch64.AppImage"
            "dist/gui/livox-mid360-diagnostics-gui-${VERSION}-linux-aarch64.deb"
          )

          for asset in "${REQUIRED[@]}"; do
            if [[ ! -s "${asset}" ]]; then
              echo "Missing GUI release asset: ${asset}" >&2
              exit 1
            fi
          done

      - name: 计算上一版本标签
        id: previous
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          PREVIOUS_TAG="$(
            git tag --sort=-v:refname \
              | grep -E '^v[0-9]+[.][0-9]+[.][0-9]+$' \
              | grep -Fxv "${TAG}" \
              | head -n 1 || true
          )"
          echo "tag=${PREVIOUS_TAG}" >> "${GITHUB_OUTPUT}"

      - name: 生成 Release 说明
        shell: bash
        run: |
          set -euo pipefail
          ARGS=(
            --version "${{ steps.version.outputs.version }}"
            --changelog CHANGELOG.md
            --output release-notes.md
            --repo "${GITHUB_REPOSITORY}"
            --current-tag "${{ steps.version.outputs.tag }}"
          )

          if [[ -n "${{ steps.previous.outputs.tag }}" ]]; then
            ARGS+=(--previous-tag "${{ steps.previous.outputs.tag }}")
          fi

          python3 scripts/release/extract_changelog.py "${ARGS[@]}"

      - name: 创建 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          TITLE="Livox MID360 Diagnostics v${{ steps.version.outputs.version }}"
          VERSION="${{ steps.version.outputs.version }}"
          ASSETS=(
            "dist/prebuilt/livox_mid360_diagnostics-linux-x86_64"
            "dist/prebuilt/livox_mid360_diagnostics-linux-aarch64"
            "dist/prebuilt/livox_mid360_diagnostics-${VERSION}-linux-x86_64"
            "dist/prebuilt/livox_mid360_diagnostics-${VERSION}-linux-aarch64"
            "dist/prebuilt/livox-mid360-diagnostics-cpp-${VERSION}-linux-x86_64.tar.gz"
            "dist/prebuilt/livox-mid360-diagnostics-cpp-${VERSION}-linux-aarch64.tar.gz"
            "dist/gui/livox-mid360-diagnostics-gui-${VERSION}-linux-x86_64.AppImage"
            "dist/gui/livox-mid360-diagnostics-gui-${VERSION}-linux-x86_64.deb"
            "dist/gui/livox-mid360-diagnostics-gui-${VERSION}-linux-aarch64.AppImage"
            "dist/gui/livox-mid360-diagnostics-gui-${VERSION}-linux-aarch64.deb"
          )

          shopt -s nullglob
          ASSETS+=(dist/gui/livox-mid360-diagnostics-gui-"${VERSION}"-linux-*.rpm)

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release already exists for ${TAG}" >&2
            exit 1
          fi

          gh release create "${TAG}" "${ASSETS[@]}" --title "${TITLE}" --notes-file release-notes.md

  build-gui:
    name: 构建 ${{ matrix.arch }} GUI 安装包
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    container: ubuntu:20.04
    steps:
      - name: 安装系统依赖
        shell: bash
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            cmake \
            curl \
            file \
            g++ \
            gcc \
            git \
            libappindicator3-dev \
            libgtk-3-dev \
            libncursesw5-dev \
            librsvg2-dev \
            libsoup2.4-dev \
            libssl-dev \
            libwebkit2gtk-4.0-dev \
            make \
            patchelf \
            pkg-config \
            python3 \
            python3-pip \
            rpm \
            tar

      - name: 检出仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: 安装 pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
          run_install: false

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 构建并嵌入诊断二进制
        shell: bash
        run: |
          set -euo pipefail
          ARCH="${{ matrix.arch }}"
          ./scripts/package_cpp_prebuilt.sh
          mkdir -p gui/src-tauri/resources
          cp "dist/prebuilt/livox_mid360_diagnostics-linux-${ARCH}" "gui/src-tauri/resources/livox_mid360_diagnostics-linux-${ARCH}"

      - name: 构建 GUI 安装包
        shell: bash
        working-directory: gui
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm tauri build --bundles appimage,deb,rpm

      - name: 整理 GUI 附件
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          ARCH="${{ matrix.arch }}"
          mkdir -p dist/gui

          bundle_dir="gui/src-tauri/target/release/bundle"
          echo "Available GUI bundle outputs:"
          find "${bundle_dir}" -maxdepth 4 -type f -print | sort

          appimage="$(find "${bundle_dir}" -type f -name '*.AppImage' | head -n 1 || true)"
          deb="$(find "${bundle_dir}" -type f -name '*.deb' | head -n 1 || true)"
          rpm="$(find "${bundle_dir}" -type f -name '*.rpm' | head -n 1 || true)"

          if [[ -z "${appimage}" || ! -s "${appimage}" ]]; then
            echo "Missing GUI AppImage bundle" >&2
            exit 1
          fi
          if [[ -z "${deb}" || ! -s "${deb}" ]]; then
            echo "Missing GUI deb bundle" >&2
            exit 1
          fi

          cp "${appimage}" "dist/gui/livox-mid360-diagnostics-gui-${VERSION}-linux-${ARCH}.AppImage"
          cp "${deb}" "dist/gui/livox-mid360-diagnostics-gui-${VERSION}-linux-${ARCH}.deb"
          if [[ -n "${rpm}" && -s "${rpm}" ]]; then
            cp "${rpm}" "dist/gui/livox-mid360-diagnostics-gui-${VERSION}-linux-${ARCH}.rpm"
          fi

      - name: 上传 GUI 产物
        uses: actions/upload-artifact@v7
        with:
          name: gui-${{ matrix.arch }}
          path: dist/gui/*
          if-no-files-found: error
          retention-days: 7
